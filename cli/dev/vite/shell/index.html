<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>bongle dev</title>
        <!-- engine deps read process.env in the browser; shim before any module. -->
        <script>
            window.process ??= { env: { NODE_ENV: 'development' }, platform: 'browser', argv: [], version: '', versions: {} };
        </script>
        <style>
            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
            /* the edit UI (Viewport) + engine own the canvas sizing / DPR — don't
               force it here, or the backing store mismatches the display (blur). */
        </style>
    </head>
    <body>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
